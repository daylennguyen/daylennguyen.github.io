# Publish a static redirect from https://daylennguyen.github.io/ to https://itme.day/
name: Redirect to itme.day

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload redirect artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./redirect-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
